<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orçamentos - FRIOTEX</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .item-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; align-items: end; margin-bottom: 15px; padding-bottom: 15px; border-bottom: 1px dashed #3d3d4d; }
        .item-row select, .item-row input { width: 100%; padding: 10px; background: var(--darker); border: 1px solid var(--gray-light); border-radius: 8px; color: var(--text); }
        .items-section { background: rgba(0,0,0,0.2); padding: 15px; border-radius: 12px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div id="menu-container"></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="header-title">
                <h1><i class="fas fa-file-invoice-dollar"></i> Gerenciar Orçamentos</h1>
            </div>
            <button class="btn-primary" onclick="abrirModalOrcamento()">
                <i class="fas fa-plus"></i> Novo Orçamento
            </button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Cliente</th>
                        <th>Data</th>
                        <th>Validade</th>
                        <th>Valor Total</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="orcamentos-list"></tbody>
            </table>
        </div>
    </main>

    <div id="orcamentoModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2 id="modalTitleOrcamento"><i class="fas fa-file-alt"></i> Orçamento</h2>
                <span class="close" onclick="fecharModalOrcamento()">&times;</span>
            </div>
            <form id="orcamentoForm">
                <input type="hidden" id="orcamentoId">
                <div class="form-row">
                    <div class="form-group">
                        <label>Cliente *</label>
                        <select id="clienteSelect" required></select>
                    </div>
                    <div class="form-group">
                        <label>Data *</label>
                        <input type="date" id="dataOrcamento" required>
                    </div>
                </div>
                
                <div class="items-section">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <h3>Itens do Orçamento</h3>
                        <button type="button" class="btn-secondary" onclick="adicionarLinhaItem()">+ Adicionar Item</button>
                    </div>
                    <!-- Cabeçalho das colunas dos itens -->
                    <div style="display: grid; grid-template-columns: 2fr 1fr 1fr 1fr auto; gap: 10px; font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">
                        <div>Serviço/Peça</div><div>Qtd</div><div>V. Unitário</div><div>Subtotal</div><div></div>
                    </div>
                    <div id="container-itens"></div>
                </div>

                <div style="text-align: right; font-size: 20px; margin: 20px;">
                    <strong>Total: <span style="color: #48bb78;">R$ <span id="displayTotal">0.00</span></span></strong>
                    <input type="hidden" id="valorTotal" value="0">
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Validade (Dias) *</label>
                        <input type="number" id="validade" value="15" required>
                    </div>
                    <div class="form-group">
                        <label>Condições de Pagamento / Obs</label>
                        <input type="text" id="observacoesOrcamento" placeholder="Ex: 50% entrada, 50% fim">
                    </div>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="fecharModalOrcamento()">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Orçamento</button>
                </div>
            </form>
        </div>
    </div>

    <div id="pdf-container" style="display: none;"></div>

    <script src="../js/database.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../js/orcamentos.js"></script>
</body>
</html>
