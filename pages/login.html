<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FRIOTEX</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background: var(--bg-main);">
    
    <div class="modal-content" style="padding: 40px; width: 100%; max-width: 400px; display: block; position: relative; margin: 0; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
        <div style="text-align: center; margin-bottom: 30px;">
            <h2 style="color: var(--primary); font-size: 28px; margin-bottom: 8px;">FRIOTEX</h2>
            <p style="color: var(--text-muted); font-size: 14px;">Acesso restrito ao sistema</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group" style="padding: 0;">
                <label>Login de Usuário</label>
                <input type="text" id="username" placeholder="Ex: ADMIN" required style="text-transform: uppercase;">
            </div>
            <div class="form-group" style="padding: 0;">
                <label>Senha</label>
                <input type="password" id="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 10px; height: 45px; font-size: 16px;">
                Entrar
            </button>
        </form>
    </div>

    <!-- Scripts necessários para o login funcionar -->
    <script src="js/database.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
