<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Configurações - FRIOTEX</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/mobile.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="menu-container"></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="header-title">
                <h1><i class="fas fa-cog"></i> Configurações & Acessos</h1>
                <p>Gerencie dados da empresa e permissões de usuários</p>
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(400px, 1fr)); gap: 24px;">
            <!-- Config. Empresa -->
            <div style="background: var(--bg-surface); padding: 30px; border-radius: var(--radius-lg); border: 1px solid var(--border-color);">
                <h3 style="margin-top: 0; margin-bottom: 20px; color: var(--primary);"><i class="fas fa-building"></i> Dados da Empresa (Orçamentos)</h3>
                <form id="empresaForm">
                    <input type="hidden" id="empresaId">
                    
                    <div class="form-row" style="margin-top: 0; padding: 0;">
                        <div class="form-group" style="padding: 0;">
                            <label>Nome da Empresa / Razão Social *</label>
                            <input type="text" id="nome_empresa" required>
                        </div>
                        <div class="form-group" style="padding: 0;">
                            <label>CNPJ</label>
                            <input type="text" id="cnpj">
                        </div>
                    </div>
                    <div class="form-row" style="margin-top: 0; padding: 0;">
                        <div class="form-group" style="padding: 0;">
                            <label>Telefone Comercial</label>
                            <input type="text" id="telefone">
                        </div>
                        <div class="form-group" style="padding: 0;">
                            <label>Endereço Completo</label>
                            <input type="text" id="endereco">
                        </div>
                    </div>
                    <button type="submit" class="btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
                        <i class="fas fa-save"></i> Salvar Empresa
                    </button>
                </form>
            </div>

            <!-- Gerenciamento de Usuários -->
            <div style="background: var(--bg-surface); padding: 30px; border-radius: var(--radius-lg); border: 1px solid var(--border-color);">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="margin: 0; color: var(--success);"><i class="fas fa-users-cog"></i> Usuários do Sistema</h3>
                    <button class="btn-primary" style="background: var(--success); border-color: var(--success); padding: 6px 12px; font-size: 13px;" onclick="abrirModalUsuario()">+ Adicionar</button>
                </div>
                <div class="table-container" style="border: none;">
                    <table>
                        <thead style="background: var(--bg-main);">
                            <tr>
                                <th style="padding: 10px;">Login</th>
                                <th style="padding: 10px;">Nível</th>
                                <th style="padding: 10px;">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="usuarios-list">
                            <tr><td colspan="3" style="text-align: center;">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Modal Novo Usuário -->
    <div id="usuarioModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitleUsuario"><i class="fas fa-user-plus"></i> Conta de Usuário</h2>
                <span class="close" onclick="fecharModalUsuario()">&times;</span>
            </div>
            <form id="usuarioForm">
                <input type="hidden" id="usuarioId">
                <div style="padding: 20px 24px;">
                    <p style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px; background: rgba(14, 165, 233, 0.1); padding: 10px; border-radius: var(--radius-sm); border-left: 3px solid var(--primary);">
                        <i class="fas fa-info-circle"></i> Ao criar um novo usuário, a senha padrão será <strong>12345</strong>. O usuário será obrigado a trocar a senha no primeiro acesso.
                    </p>
                    <div class="form-group" style="padding: 0;">
                        <label>Login de Acesso *</label>
                        <input type="text" id="usuarioLogin" placeholder="Ex: DANIEL.RIBEIRO" style="text-transform: uppercase;" required>
                    </div>
                    <div class="form-group" style="padding: 0;">
                        <label>Nível de Permissão *</label>
                        <select id="usuarioRole" required>
                            <option value="Técnico">Técnico (Acesso Restrito)</option>
                            <option value="Admin">Admin (Acesso Total)</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="fecharModalUsuario()">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Usuário</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../js/configuracoes.js"></script>
</body>
</html>
