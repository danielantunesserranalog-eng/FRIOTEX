<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FRIOTEX</title>
    <!-- Resolve o erro do favicon.ico -->
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg-main); margin: 0; }
        .login-box { background: var(--bg-surface); padding: 40px; border-radius: var(--radius-lg); border: 1px solid var(--border-color); width: 100%; max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header i { font-size: 40px; color: var(--primary); margin-bottom: 15px; }
        .login-header h1 { font-size: 24px; color: var(--text-main); margin: 0; }
        .login-header p { color: var(--text-muted); font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="login-header">
            <i class="fas fa-snowflake"></i>
            <h1>Acesso Restrito</h1>
            <p>FRIOTEX Refrigeração</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group" style="padding: 0; margin-bottom: 20px;">
                <label style="display: block; color: var(--text-muted); margin-bottom: 8px;">Usuário</label>
                <input type="text" id="username" placeholder="Digite seu login" style="width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-main); text-transform: uppercase;" required>
            </div>
            
            <div class="form-group" style="padding: 0; margin-bottom: 20px;">
                <label style="display: block; color: var(--text-muted); margin-bottom: 8px;">Senha</label>
                <input type="password" id="password" placeholder="••••••••" style="width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-main);" required>
            </div>

            <div id="newPasswordBlock" style="display: none;">
                <div class="form-group" style="padding: 0; margin-top: 20px; padding-top: 20px; border-top: 1px dashed var(--border-color); margin-bottom: 20px;">
                    <label style="color: var(--warning); display: block; margin-bottom: 8px;"><i class="fas fa-key"></i> Definir Nova Senha</label>
                    <input type="password" id="newPassword" placeholder="Crie sua nova senha" style="width: 100%; padding: 12px; background: var(--bg-input); border: 1px solid var(--border-color); border-radius: var(--radius-md); color: var(--text-main);">
                </div>
            </div>
            
            <button type="submit" id="btnEntrar" class="btn-primary" style="width: 100%; justify-content: center; height: 45px; font-weight: 600;">
                Entrar <i class="fas fa-sign-in-alt"></i>
            </button>
            <div id="loginMsg" style="text-align: center; margin-top: 15px; font-size: 13px; color: var(--danger); font-weight: bold;"></div>
        </form>
    </div>

    <script>
        const supabaseUrl = 'https://gaflsobdfcghtvpqcrdk.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhZmxzb2JkZmNnaHR2cHFjcmRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc3Nzg1ODUsImV4cCI6MjA5MzM1NDU4NX0.Y64crvMlfCiAcO9Jn6lBFjYeO_LmUQ_xKEM2r0mxaTY';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function gerarHash(senha) {
            const msgBuffer = new TextEncoder().encode(senha);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        let userRequiresChange = null;

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnEntrar');
            const msgDiv = document.getElementById('loginMsg');
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Validando...';
            msgDiv.innerText = '';

            const userIn = document.getElementById('username').value.trim().toUpperCase();
            const passIn = document.getElementById('password').value;
            const newPassIn = document.getElementById('newPassword').value;

            try {
                if (userRequiresChange) {
                    if (!newPassIn || newPassIn.length < 4) {
                        msgDiv.innerText = 'Mínimo 4 caracteres.';
                        btn.innerHTML = 'Salvar e Entrar'; return;
                    }
                    const newHash = await gerarHash(newPassIn);
                    const { error } = await supabaseClient.from('usuarios')
                        .update({ hash_da_senha: newHash, deve_alterar_senha: false })
                        .eq('id', userRequiresChange.id);
                    
                    if(error) throw error;
                    iniciarSessao(userRequiresChange.nome_de_usuario, userRequiresChange.papel);
                    return;
                }

                const hashIn = await gerarHash(passIn);
                
                // Puxa os dados e mostra no console para você debugar
                const { data, error } = await supabaseClient.from('usuarios').select('*');
                console.log("Usuários encontrados no banco:", data);

                if (error) {
                    msgDiv.innerText = 'Erro: ' + error.message;
                    btn.innerHTML = 'Entrar'; return;
                }

                const userFound = data.find(u => 
                    u.nome_de_usuario.trim().toUpperCase() === userIn && 
                    u.hash_da_senha.trim() === hashIn
                );

                if (!userFound) {
                    msgDiv.innerText = 'Usuário ou senha incorretos.';
                    btn.innerHTML = 'Entrar';
                    console.log("Falha no login. Hash gerado localmente:", hashIn);
                    return;
                }

                if (userFound.deve_alterar_senha) {
                    userRequiresChange = userFound;
                    document.getElementById('newPasswordBlock').style.display = 'block';
                    document.getElementById('username').readOnly = true;
                    document.getElementById('password').readOnly = true;
                    document.getElementById('newPassword').required = true;
                    msgDiv.innerText = 'Primeiro acesso. Defina uma nova senha.';
                    msgDiv.style.color = 'var(--warning)';
                    btn.innerHTML = 'Definir Senha e Entrar';
                } else {
                    iniciarSessao(userFound.nome_de_usuario, userFound.papel);
                }
            } catch (err) {
                msgDiv.innerText = 'Erro de conexão.';
                btn.innerHTML = 'Entrar';
            }
        });

        function iniciarSessao(username, role) {
            localStorage.setItem('usuarioLogado', username);
            localStorage.setItem('userRole', role);
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
