<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Serviços - FRIOTEX</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/menu.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="menu-container"></div>
    
    <main class="main-content">
        <div class="page-header">
            <div class="header-title">
                <h1><i class="fas fa-tools"></i> Gerenciar Serviços</h1>
                <p>Controle todos os serviços de refrigeração</p>
            </div>
            <button class="btn-primary" onclick="abrirModalServico()">
                <i class="fas fa-plus"></i> Novo Serviço
            </button>
        </div>

        <div class="filters-section">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="search-servico" placeholder="Buscar serviço por cliente, tipo ou descrição..." onkeyup="filtrarServicos()">
            </div>
            <div class="filter-group">
                <select id="status-filter" class="filter-select" onchange="filtrarServicos()">
                    <option value="todos">Todos os Status</option>
                    <option value="Pendente">📋 Pendente</option>
                    <option value="Em andamento">⚙️ Em andamento</option>
                    <option value="Concluído">✅ Concluído</option>
                </select>
                <button class="btn-secondary" onclick="limparFiltros()">
                    <i class="fas fa-eraser"></i> Limpar
                </button>
            </div>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th><i class="fas fa-user"></i> Cliente</th>
                        <th><i class="fas fa-wrench"></i> Tipo de Serviço</th>
                        <th><i class="fas fa-calendar"></i> Data</th>
                        <th><i class="fas fa-chart-line"></i> Status</th>
                        <th><i class="fas fa-dollar-sign"></i> Valor</th>
                        <th><i class="fas fa-cogs"></i> Ações</th>
                    </tr>
                </thead>
                <tbody id="servicos-list"></tbody>
            </table>
        </div>
    </main>

    <div id="servicoModal" class="modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <div>
                    <h2 id="modalTitleServico"><i class="fas fa-plus-circle"></i> Novo Serviço</h2>
                    <p>Registre um novo serviço de refrigeração</p>
                </div>
                <span class="close" onclick="fecharModalServico()">&times;</span>
            </div>
            <form id="servicoForm">
                <input type="hidden" id="servicoId">
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-user"></i> Cliente *</label>
                        <select id="clienteSelect" required>
                            <option value="">Selecione um cliente</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-wrench"></i> Tipo de Serviço *</label>
                        <select id="tipoServico" required>
                            <option value="Manutenção Preventiva">🔧 Manutenção Preventiva</option>
                            <option value="Manutenção Corretiva">⚡ Manutenção Corretiva</option>
                            <option value="Instalação">🏗️ Instalação</option>
                            <option value="Limpeza">🧹 Limpeza</option>
                            <option value="Recarga de Gás">💨 Recarga de Gás</option>
                            <option value="Substituição de Peças">🔄 Substituição de Peças</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-calendar"></i> Data do Serviço *</label>
                        <input type="date" id="dataServico" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-tag"></i> Status *</label>
                        <select id="status" required>
                            <option value="Pendente">📋 Pendente</option>
                            <option value="Em andamento">⚙️ Em andamento</option>
                            <option value="Concluído">✅ Concluído</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label><i class="fas fa-dollar-sign"></i> Valor (R$) *</label>
                        <input type="number" id="valor" step="0.01" placeholder="0,00" required>
                    </div>
                    <div class="form-group">
                        <label><i class="fas fa-clock"></i> Prazo (dias)</label>
                        <input type="number" id="prazo" placeholder="Dias para conclusão">
                    </div>
                </div>
                <div class="form-group">
                    <label><i class="fas fa-align-left"></i> Descrição do Serviço</label>
                    <textarea id="descricao" rows="3" placeholder="Descreva os detalhes do serviço, equipamentos, observações técnicas..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="fecharModalServico()">Cancelar</button>
                    <button type="submit" class="btn-primary">Salvar Serviço</button>
                </div>
            </form>
        </div>
    </div>

    <div id="detalhesModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2><i class="fas fa-info-circle"></i> Detalhes do Serviço</h2>
                <span class="close" onclick="fecharDetalhesModal()">&times;</span>
            </div>
            <div id="detalhesContent"></div>
        </div>
    </div>

    <script src="../js/database.js"></script>
    <script src="../js/menu.js"></script>
    <script src="../js/clientes.js"></script>
    <script src="../js/servicos.js"></script>
</body>
</html>
